          anyOf:
            - type: string
            - type: 'null'
          title: Mounted By
          description: >-
            Service-managed: Username who mounted this volume. Set automatically
            when volume_mounts are created/updated.
        sub_path:
          type: string
          title: Sub Path
          description: >-
            Sub-path within the source volume/snapshot to mount. Not used for
            ephemeral.
          default: ''
        read_only:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Read Only
          description: >-
            If true, mount will be read-only. Default: False for volumes/pvc,
            True for snapshots/ephemeral.
        config_content:
          anyOf:
            - type: string
            - type: 'null'
          title: Config Content
          description: >-
            Config file content. For ephemeral: mounted as ConfigMap. For
            tapisvolume: written to NFS. Supports ${pods:secrets:KEY}
            interpolation. Max 1MB.
        config_permissions:
          type: string
          title: Config Permissions
          description: Unix file permissions for config file (e.g., '0644', '0600').
