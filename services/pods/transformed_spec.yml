  /v3/pods/secrets:
    get:
      tags:
        - Secrets
      summary: list_secrets
      description: >-
        Get all secrets you have permission to access.


        25Q4 Feature: Pods Secrets allow secure injection of credentials into
        pods.


        Note:

        - Returns metadata only, not secret values (use GET
        /secrets/{name}/value).

        - Filter shows only secrets where you have READ+ permission.


        Returns a list of secrets (without secret values).
      operationId: list_secrets
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretsResponse'
    post:
      tags:
        - Secrets
      summary: create_secret
      description: >-
        Create a secret with inputted information.


        25Q4 Feature: Pods Secrets allow secure injection of credentials into
        pods.


        Notes:

        - This endpoint creates new secrets only. Returns 409 Conflict if
        secret_id already exists.

        - To update an existing secret, use PUT /pods/secrets/{secret_id}.

        - Secrets are stored securely in Tapis Security Kernel (SK).

        - Secret names are automatically namespaced:
        ``pods_{tenant}_user_{username}_{name}``

        - Only initial ADMIN can use this secret in pods unless you grant
        permissions.

        - Use ``secret_map`` in pod definitions to inject as environment
        variables.

        - All secret operations are logged


        Request Body Fields:

        - **secret_id** (required): Alphanumeric name with underscores/dashes
        allowed (max 100 chars)

        - **secret_value** (required): The actual secret value to store securely

        - **description** (optional): ASCII description (max 500 chars)

        - **scope** (optional): ``user`` (default) or ``pod`` - determines
        secret visibility

        - **pod_id** (optional): Required if scope is ``pod``, must be omitted
        if scope is ``user``

        - **readable** (optional): ``true`` (default) or ``false`` - controls if
        value can be retrieved via API

        - **writable** (optional): ``true`` (default) or ``false`` - controls if
        value can be updated via PUT


        Access Mode Combinations:

        - ``readable=true, writable=true`` (default): Full access - value can be
        read and updated

        - ``readable=true, writable=false``: Read-only - value can be read but
        not updated (write-once)

        - ``readable=false, writable=true``: Write-only - value can be updated
        but not read via API

        - ``readable=false, writable=false``: Locked - value cannot be read or
        updated, only used via pod injection


        Note: Pod injection via ``secret_map`` always works regardless of
        ``readable`` setting.


        Usage in Pods:

        After creating a secret, reference it in your pod's ``secret_map``;
        after that, reference it with ${} in the fields that support secrets::

            {
                "secret_map": {
                    "DB_PASSWORD": "${secret:my_db_secret}"
                },
                "environment_variables": {
                    "DATABASE_URL": "postgres://user:${pods:secrets:DB_PASSWORD}@localhost/db"
                }
            }

        Returns new secret object (without the secret value).
      operationId: create_secret
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSecret'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/secrets/{secret_id}:
    get:
      tags:
        - Secrets
      summary: get_secret
      description: >-
        Get secret metadata (not the secret value itself).


        25Q4 Feature: Pods Secrets allow secure injection of credentials into
        pods.


        Note:

        - Returns metadata only. Use GET /secrets/{name}/value to retrieve the
        actual value.

        - Requires READ permission on the secret.


        Returns secret metadata.
      operationId: get_secret
      parameters:
        - name: secret_id
          in: path
          required: true
          schema:
            type: string
            title: Secret Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
        - Secrets
      summary: update_secret
      description: >-
        Update a secret's description and/or value.


        25Q4 Feature: Pods Secrets allow secure injection of credentials into
        pods.


        Note:

        - Requires USER permission on the secret.

        - Secrets with ``writable=False`` cannot have their values updated
        (write-once secrets).

        - Description updates are always allowed regardless of ``writable``
        setting.

        - Updates are logged.

        - Pods using this secret will get the new value on next start/restart.


        Returns updated secret metadata.
      operationId: update_secret
      parameters:
        - name: secret_id
          in: path
          required: true
          schema:
            type: string
            title: Secret Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSecret'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - Secrets
      summary: delete_secret
      description: >-
        Delete a secret from both the database and Security Kernel (SK).


        25Q4 Feature: Pods Secrets allow secure injection of credentials into
        pods.


        Note:

        - Requires ADMIN permission on the secret (only the creator has this by
        default).

        - This operation is permanent and cannot be undone.

        - Pods currently using this secret will fail to start until the secret
        reference is removed or a new secret with the same name is created by
        the pod owner.

        - All delete operations are logged.


        Returns the deleted secret name.
      operationId: delete_secret
      parameters:
        - name: secret_id
          in: path
          required: true
          schema:
            type: string
            title: Secret Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/secrets/{secret_id}/value:
    get:
      tags:
        - Secrets
      summary: get_secret_value
      description: >-
        Get the actual secret value from SK.


        25Q4 Feature: Pods Secrets allow secure injection of credentials into
        pods.


        Note:

        - Requires USER permission on the secret (higher than READ).

        - Secrets with ``readable=False`` cannot have their values retrieved via
