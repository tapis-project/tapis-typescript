        - read_only: Whether mount is read-only (default varies by type)

        - config_content: For ephemeral type, the inline config file content
        (max 1MB)

        - config_permissions: For ephemeral type, Unix file permissions (default
        0644)

        - mounted_by: Service-managed field tracking which user mounted this
        volume (set by API, not user)
