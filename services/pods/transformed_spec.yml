        config_filename:
          anyOf:
            - type: string
            - type: 'null'
          title: Config Filename
          description: >-
            Filename for config file when using tapisvolume with config_content.
            Defaults to basename of mount_path.
        config_update_mode:
          type: string
          title: Config Update Mode
          description: >-
            Config update behavior: 'always' recreates config on each pod start,
            'once' only creates if file/ConfigMap doesn't exist.
          default: always
      additionalProperties: false
      type: object
      required:
        - type
      title: VolumeMount
      description: >-
        Volume mount configuration for attaching volumes, snapshots, or inline
        configs to pods.


        Object-keyed structure (v3) - mount_path is the key in volume_mounts
        dict:

        - type: One of 'tapisvolume', 'tapissnapshot', 'ephemeral', 'pvc'

        - source_id: Required for tapisvolume, tapissnapshot, pvc. Not used for
