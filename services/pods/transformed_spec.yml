openapi: 3.1.0
info:
  title: Tapis Pods Service
  description: >

    The Pods Service is a web service and distributed computing platform
    providing pods-as-a-service (PaaS). The service 

    implements a message broker and processor model that requests pods,
    alongside a health module to poll for pod

    data, including logs, status, and health. The primary use of this service is
    to have quick to deploy long-lived

    services based on Docker images that are exposed via HTTP or TCP endpoints
    listed by the API.


    **The Pods service provides functionality for two types of pod solutions:**
     * **Templated Pods** for run-as-is popular images. Neo4J is one example, the template manages TCP ports, user creation, and permissions.
     * **Custom Pods** for arbitrary docker images with less functionality. In this case we will expose port 5000 and do nothing else.

     The live-docs act as the most up-to-date API reference. Visit the [documentation for more information](https://tapis.readthedocs.io/en/latest/technical/pods.html).
  contact:
    name: CIC Support
    url: https://tapis-project.org/
    email: cicsupport@tacc.utexas.edu
  license:
    name: BSD 3.0
    url: https://github.com/tapis-project/pods_service
  version: 1.9.2
paths:
  /v3/traefik-config:
    get:
      tags:
        - Misc
      summary: traefik_config
      description: >-
        Supplies traefik-config to service. Returns json traefik-config object
        for

        traefik to use with the http provider. Dynamic configs don't work well
        in 

        Kubernetes.
      operationId: traefik_config
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v3/healthcheck:
    get:
      tags:
        - Misc
      summary: healthcheck
      description: |-
        Health check for service. Returns healthy when api is running.
        Should add database health check, should add kubernetes health check
      operationId: healthcheck
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v3/error-handler/{status}:
    get:
      tags:
        - Misc
      summary: error_handler
      description: Handles all error codes from Traefik.
      operationId: error_handler
      parameters:
        - name: status
          in: path
          required: true
          schema:
            title: Status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/templates:
    get:
      tags:
        - Templates
      summary: list_templates
      description: >-
        Get all templates allowed globally + in respective tenant + for specific
        user.

        Returns a list of templates.
      operationId: list_templates
      parameters:
        - name: include_dependencies
          in: query
          required: false
          schema:
            type: boolean
            description: >-
              Include dependency information (admin only). Shows which pods and
              tags depend on each template tag.
            default: false
            title: Include Dependencies
          description: >-
            Include dependency information (admin only). Shows which pods and
            tags depend on each template tag.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplatesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
        - Templates
      summary: add_template
      description: |-
        Add a template with inputted information.

        Returns new template object.
      operationId: add_template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTemplate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/templates/tags:
    get:
      tags:
        - Templates
      summary: list_templates_and_tags
      description: |-
        Get all templates and their tags for the user.
        Returns a dictionary with templates and their tags.
      operationId: list_templates_and_tags
      parameters:
        - name: full
          in: query
          required: false
          schema:
            type: boolean
            description: Returns tag pod_definition with tag when full=true
            default: true
            title: Full
          description: Returns tag pod_definition with tag when full=true
        - name: include_dependencies
          in: query
          required: false
          schema:
            type: boolean
            description: >-
              Include dependency information (admin only). Shows which pods and
              tags depend on each template tag.
            default: false
            title: Include Dependencies
          description: >-
            Include dependency information (admin only). Shows which pods and
            tags depend on each template tag.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Templates And Tags
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/templates/{template_id}:
    put:
      tags:
        - Templates
      summary: update_template
      description: >-
        Update a template.


        Note:

        - Fields that change template id cannot be modified. Please recreate
        your template in that case.


        Returns updated template object.
      operationId: update_template
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            title: Template Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - Templates
      summary: delete_template
      description: |-
        Delete a template.

        Returns "".
      operationId: delete_template
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            title: Template Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - Templates
      summary: get_template
      description: |-
        Get a template.

        Returns retrieved templates object.
      operationId: get_template
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
            title: Template Id
        - name: include_dependencies
          in: query
          required: false
          schema:
            type: boolean
            description: >-
              Include dependency information (admin only). Shows which pods and
              tags depend on each template tag.
            default: false
            title: Include Dependencies
          description: >-
            Include dependency information (admin only). Shows which pods and
            tags depend on each template tag.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/templates/{template_id}/tags:
    get:
      tags:
        - Templates
      summary: list_template_tags
      description: |-
        List tag entries the template has

        Returns the ledger of template tags
      operationId: list_template_tags
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
            title: Template Id
        - name: full
          in: query
          required: false
          schema:
            type: boolean
            description: Return pod_definition in tag when full=true
            default: true
            title: Full
          description: Return pod_definition in tag when full=true
        - name: include_configs
          in: query
          required: false
          schema:
            type: boolean
            description: >-
              Include full config_content for volume mounts using field.
              Default: false (shows placeholder with size)
            default: false
            title: Include Configs
          description: >-
            Include full config_content for volume mounts using field. Default:
            false (shows placeholder with size)
        - name: include_dependencies
          in: query
          required: false
          schema:
            type: boolean
            description: >-
              Include dependency information (admin only). Shows which pods and
              tags depend on each template tag.
            default: false
            title: Include Dependencies
          description: >-
            Include dependency information (admin only). Shows which pods and
            tags depend on each template tag.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateTagsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
        - Templates
      summary: add_template_tag
      description: >-
        Add a new tag to a template.


        Template tags can include a ``pod_definition`` with ``secret_map`` to
        define placeholders 

        that users must or can optionally override when creating pods from this
        template.


        Secret Placeholders (25Q4 Feature):

        - ``${pods:default:value:?description}`` - Placeholder with a default
        value

        - ``${:?description}`` - Required placeholder (pod creation fails if not
        overridden)

        - ``${secret:name}`` - Direct secret reference (for templates with
        pre-configured secrets)


        When users create pods from this template, they can override
        placeholders with actual

        secret references in their pod's ``secret_map``.


        Returns new template tag object.
      operationId: add_template_tag
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
            title: Template Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTemplateTag'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateTagResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/templates/{template_id}/permissions:
    get:
      tags:
        - Permissions
      summary: get_template_permissions
      description: >-
        Get a templates permissions.


        Note:

        - There are 3 levels of permissions, READ, USER, and ADMIN.

        - Permissions are granted/revoked to individual TACC usernames.

        - Permissions can be set for TENANT or SITE keys for tenant-level or
        site-level sharing.


        Returns all template permissions.
      operationId: get_template_permissions
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            title: Template Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplatePermissionsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
        - Permissions
      summary: set_template_permission
      description: >-
        Set a permission for a template.


        Permission formats:

        - username:LEVEL - Standard user permission (e.g., 'jsmith:READ')

        - **:READ - Site-wide public access (all users across all tenants can
        READ) [ADMIN ONLY]

        - tenant.<tenant_id>:READ - Tenant-wide public access (all users in
        specified tenant can READ) [ADMIN ONLY]


        Notes:

        - Both '**' and 'tenant.*' only allow READ level for security

        - '**' and 'tenant.*' permissions require admin privileges

        - There are 3 levels of permissions, READ, USER, and ADMIN.

        - Permissions are granted to an individual usernames and are active
        across tenants.


        Returns updated template permissions.
      operationId: set_template_permission
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            title: Template Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPermission'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplatePermissionsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/templates/{template_id}/permissions/{user}:
    delete:
      tags:
        - Permissions
      summary: delete_template_permission
      description: |-
        Delete a permission from a template.

        Returns updated template permissions.
      operationId: delete_template_permission
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            title: Template Id
        - name: user
          in: path
          required: true
          schema:
            title: User
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplatePermissionsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/templates/{template_id}/tags/{tag_id}:
    get:
      tags:
        - Templates
      summary: get_template_tag
      description: |-
        Get a specific tag entry the template has

        Returns the tag entry
      operationId: get_template_tag
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
            title: Template Id
        - name: tag_id
          in: path
          required: true
          schema:
            type: string
            title: Tag Id
        - name: include_configs
          in: query
          required: false
          schema:
            type: boolean
            description: >-
              Include full config_content for volume mounts using field.
              Default: false (shows placeholder with size)
            default: false
            title: Include Configs
          description: >-
            Include full config_content for volume mounts using field. Default:
            false (shows placeholder with size)
        - name: include_dependencies
          in: query
          required: false
          schema:
            type: boolean
            description: >-
              Include dependency information (admin only). Shows which pods and
              tags depend on this template tag.
            default: false
            title: Include Dependencies
          description: >-
            Include dependency information (admin only). Shows which pods and
            tags depend on this template tag.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateTagsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - Templates
      summary: delete_template_tag
      description: >-
        Delete a specific template tag. (Admin only)


        If the tag has dependent pods or other template tags that inherit from
        it,

        deletion will fail unless the `force=true` query parameter is provided.


        Returns the deleted tag information.
      operationId: delete_template_tag
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
            title: Template Id
        - name: tag_id
          in: path
          required: true
          schema:
            type: string
            title: Tag Id
        - name: force
          in: query
          required: false
          schema:
            type: boolean
            description: >-
              Force deletion even if pods or other template tags depend on this
              tag. Use with caution.
            default: false
            title: Force
          description: >-
            Force deletion even if pods or other template tags depend on this
            tag. Use with caution.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateTagResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/images:
    get:
      tags:
        - Images
      summary: get_images
      description: |-
        Get all images allowed globally + in respective tenant.

        Returns a list of images.
      operationId: get_images
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesResponse'
    post:
      tags:
        - Images
      summary: add_image
      description: |-
        Add a image with inputted information.

        Returns new image object.
      operationId: add_image
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewImage'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/images/bulk:
    post:
      tags:
        - Images
      summary: add_images
      description: |-
        Add multiple images with inputted information.

        Returns new image objects.
      operationId: add_images
      parameters:
        - name: skip_duplicates
          in: query
          required: false
          schema:
            type: boolean
            description: Whether to skip duplicates or fail on duplicates.
            default: false
            title: Skip Duplicates
          description: Whether to skip duplicates or fail on duplicates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/NewImage'
              title: New Images
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/images/{image_id}:
    delete:
      tags:
        - Images
      summary: delete_image
      description: |-
        Delete an image.

        Returns "".
      operationId: delete_image
      parameters:
        - name: image_id
          in: path
          required: true
          schema:
            title: Image Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - Images
      summary: get_image
      description: |-
        Get an image.

        Returns retrieved image object.
      operationId: get_image
      parameters:
        - name: image_id
          in: path
          required: true
          schema:
            title: Image Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/ImageResponse'
                  - $ref: '#/components/schemas/ImageDeleteResponse'
                title: Response Get Image
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/snapshots:
    get:
      tags:
        - Snapshots
      summary: list_snapshots
      description: >-
        Get all snapshots in your respective tenant and site that you have READ
        or higher access to.


        Returns a list of snapshots.
      operationId: list_snapshots
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotsResponse'
    post:
      tags:
        - Snapshots
      summary: create_snapshot
      description: |-
        Create a snapshot with inputted information.

        Notes:
        - Author will be given ADMIN level permissions to the snapshot.

        Returns new snapshot object.
      operationId: create_snapshot
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSnapshot'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/snapshots/{snapshot_id}:
    put:
      tags:
        - Snapshots
      summary: update_snapshot
      description: >-
        Update a snapshot.


        Note:

        - Fields that change snapshot source or sink are not modifiable. Please
        recreate your snapshot in that case.


        Returns updated snapshot object.
      operationId: update_snapshot
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema:
            title: Snapshot Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSnapshot'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - Snapshots
      summary: delete_snapshot
      description: |-
        Delete a snapshot.

        Returns "".
      operationId: delete_snapshot
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema:
            title: Snapshot Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSnapshotResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - Snapshots
      summary: get_snapshot
      description: |-
        Get a snapshot.

        Returns retrieved snapshot object.
      operationId: get_snapshot
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema:
            title: Snapshot Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/snapshots/{snapshot_id}/list:
    get:
      tags:
        - Snapshots
      summary: list_snapshot_files
      description: List files in snapshot.
      operationId: list_snapshot_files
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema:
            title: Snapshot Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilesListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/snapshots/{snapshot_id}/contents/{path}:
    get:
      tags:
        - Snapshots
      summary: get_snapshot_contents
      description: >-
        Get file or directory contents as a stream of data from a Tapis
        Snapshot.


        Use the **zip** query parameter to request directories as a zip archive.
        This is not allowed if path would result in all files in the snapshot
        being included. Please download individual directories, files or
        objects.
      operationId: get_snapshot_contents
      parameters:
        - name: snapshot_id
          in: path
          required: true
          schema:
            type: string
            description: Unique identifier for the snapshot.
            title: Snapshot Id
          description: Unique identifier for the snapshot.
        - name: path
          in: path
          required: true
          schema:
            type: string
            description: >-
              Path relative to the snapshot's root directory. Cannot be empty or
              /.
            title: Path
          description: >-
            Path relative to the snapshot's root directory. Cannot be empty or
            /.
        - name: zip
          in: query
          required: false
          schema:
            type: boolean
            description: If true, directory contents are compressed using ZIP format.
            default: false
            title: Zip
          description: If true, directory contents are compressed using ZIP format.
      responses:
        '200':
          description: A streamed response of the file contents.
          content:
            application/json:
              schema: {}
            application/octet-stream: {}
            application/zip: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v3/pods/snapshots/{snapshot_id}/download/{path}:
    get:
      tags:
        - Snapshots
      summary: download_snapshot_file
      description: >-
        Download a specific file from a Tapis Snapshot.


        Efficiently handles large files (100MB - 10GB) from NFS-backed storage
        by streaming in chunks.


        Note:

